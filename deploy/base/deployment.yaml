apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    control-plane: controller-manager
  name: kafka-topic-controller-manager
  namespace: kafka
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      containers:
      - command:
        - ./kafka-topic-controller
        env:
        - name: SCC_URL
          valueFrom:
            secretKeyRef:
              key: scc_url
              name: kasecrets
              optional: true
        - name: AUTH
          valueFrom:
            secretKeyRef:
              key: scc_auth
              name: kasecrets
              optional: true
        image: ghcr.io/kanggara75/kafka-topic-controller:latest
        name: manager
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
      serviceAccountName: kafka-topic-controller-manager

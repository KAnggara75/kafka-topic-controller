apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka-topic-controller
  namespace: kafka
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kafka-topic-controller-role
rules:
- apiGroups:
  - kafka.kanggara.my.id
  resources:
  - kafkatopics
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - kafka.kanggara.my.id
  resources:
  - kafkatopics/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - kafka.kanggara.my.id
  resources:
  - kafkatopics/finalizers
  verbs:
  - update
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kafka-topic-controller-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kafka-topic-controller-role
subjects:
- kind: ServiceAccount
  name: kafka-topic-controller
  namespace: kafka
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-topic-controller
  namespace: kafka
  labels:
    app: kafka-topic-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-topic-controller
  template:
    metadata:
      labels:
        app: kafka-topic-controller
    spec:
      serviceAccountName: kafka-topic-controller
      containers:
      - name: controller
        image: ghcr.io/kanggara75/kafka-topic-controller:latest
        imagePullPolicy: Always
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: kafka.pakaiwa.my.id:29092
        - name: SASL_MECHANISM
          value: PLAIN
        - name: SECURITY_PROTOCOL
          value: SASL_SSL
        - name: SSL_TRUSTSTORE_LOCATION
          value: /opt/truststore.jks
        - name: SSL_TRUSTSTORE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kasecrets
              key: root_password
        - name: SASL_JAAS_CONFIG
          valueFrom:
            secretKeyRef:
              name: kasecrets
              key: jaas_config
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: truststore
          mountPath: /opt/truststore.jks
          subPath: truststore.jks
          readOnly: true
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: truststore
        secret:
          secretName: kafka
          items:
          - key: truststore.jks
            path: truststore.jks

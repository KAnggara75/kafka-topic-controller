apiVersion: v1
kind: Namespace
metadata:
  name: kafka
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kafkatopics.kafka.kanggara.my.id
spec:
  group: kafka.kanggara.my.id
  names:
    kind: KafkaTopic
    listKind: KafkaTopicList
    plural: kafkatopics
    singular: kafkatopic
    shortNames:
    - kt
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: KafkaTopic is the Schema for the kafkatopics API
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation
              of an object. Servers should convert recognized schemas to the latest
              internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this
              object represents. Servers may infer this from the endpoint the client
              submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
            type: string
          metadata:
            type: object
          spec:
            description: KafkaTopicSpec defines the desired state of KafkaTopic
            properties:
              config:
                additionalProperties:
                  type: string
                type: object
              partitions:
                format: int32
                type: integer
              replicationFactor:
                format: int32
                type: integer
            required:
            - partitions
            - replicationFactor
            type: object
          status:
            description: KafkaTopicStatus defines the observed state of KafkaTopic
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka-topic-controller-manager
  namespace: kafka
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kafka-topic-controller-manager-role
rules:
- apiGroups:
  - kafka.kanggara.my.id
  resources:
  - kafkatopics
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kafka.kanggara.my.id
  resources:
  - kafkatopics/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kafka-topic-controller-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kafka-topic-controller-manager-role
subjects:
- kind: ServiceAccount
  name: kafka-topic-controller-manager
  namespace: kafka
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    control-plane: controller-manager
  name: kafka-topic-controller-manager
  namespace: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      containers:
      - command:
        - ./kafka-topic-controller
        env:
        - name: SCC_URL
          valueFrom:
            secretKeyRef:
              key: scc_url
              name: kasecrets
              optional: true
        - name: AUTH
          valueFrom:
            secretKeyRef:
              key: scc_auth
              name: kasecrets
              optional: true
        image: kanggara75/kafka-topic-controller:latest
        name: manager
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
      serviceAccountName: kafka-topic-controller-manager
